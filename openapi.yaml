paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register client account
      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"
        - $ref: "#/components/parameters/PlatformHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
            examples:
              default:
                $ref: "#/components/examples/RegisterClientRequest"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
              examples:
                default:
                  $ref: "#/components/examples/RegisterSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      x-post-response-script: |-
        let json;
        try {
          json = pm.response.json();
        } catch (error) {
          pm.console.log("Response is not JSON; skipping token extraction.");
        }

        if (json && typeof json === "object") {
          const data = json.data || {};
          const roleToAccessVar = {
            client: "clientToken",
            staff: "staffToken",
            branch_admin: "branchAdminToken",
            super_admin: "adminToken",
          };
          const roleToRefreshVar = {
            client: "refreshClientToken",
            staff: "refreshStaffToken",
            branch_admin: "refreshBranchAdminToken",
            super_admin: "refreshAdminToken",
          };

          const role =
            (data.user && data.user.role) ||
            data.role ||
            pm.environment.get("authRole") ||
            "client";

          pm.environment.set("authRole", role);

          if (data.token) {
            pm.environment.set("authToken", data.token);
            const accessVar = roleToAccessVar[role];
            if (accessVar) pm.environment.set(accessVar, data.token);
          }

          if (data.refreshToken) {
            pm.environment.set("refreshToken", data.refreshToken);
            const refreshVar = roleToRefreshVar[role];
            if (refreshVar) pm.environment.set(refreshVar, data.refreshToken);
          }

          if (data.resetToken) {
            pm.environment.set("resetToken", data.resetToken);
          }
        }
      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"
        - $ref: "#/components/parameters/PlatformHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              client:
                $ref: "#/components/examples/LoginClientRequest"
              staff:
                $ref: "#/components/examples/LoginStaffRequest"
              branchAdmin:
                $ref: "#/components/examples/LoginBranchAdminRequest"
              superAdmin:
                $ref: "#/components/examples/LoginSuperAdminRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponseData"
              examples:
                clientApp:
                  $ref: "#/components/examples/LoginClientSuccessResponse"
                staffApp:
                  $ref: "#/components/examples/LoginStaffSuccessResponse"
                branchAdminApp:
                  $ref: "#/components/examples/LoginBranchAdminSuccessResponse"
                superAdminWeb:
                  $ref: "#/components/examples/LoginSuperAdminSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email OTP
      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCodeRequest"
            examples:
              default:
                $ref: "#/components/examples/VerifyClientCodeRequest"
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
              examples:
                default:
                  $ref: "#/components/examples/SimpleSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/verify-phone:
    post:
      tags: [Auth]
      summary: Verify phone OTP and login
      x-post-response-script: |-
        let json;
        try {
          json = pm.response.json();
        } catch (error) {
          pm.console.log("Response is not JSON; skipping token extraction.");
        }

        if (json && typeof json === "object") {
          const data = json.data || {};
          const role =
            (data.user && data.user.role) ||
            data.role ||
            pm.environment.get("authRole") ||
            "client";

          pm.environment.set("authRole", role);

          if (data.token) {
            pm.environment.set("authToken", data.token);
            if (role === "client") pm.environment.set("clientToken", data.token);
          }

          if (data.refreshToken) {
            pm.environment.set("refreshToken", data.refreshToken);
            if (role === "client") {
              pm.environment.set("refreshClientToken", data.refreshToken);
            }
          }
        }
      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"
        - $ref: "#/components/parameters/PlatformHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyCodeRequest"
            examples:
              default:
                $ref: "#/components/examples/VerifyClientCodeRequest"
      responses:
        "200":
          description: Phone verified and token returned
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponseData"
              examples:
                default:
                  $ref: "#/components/examples/VerifyPhoneSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/resend-code:
    post:
      tags: [Auth]
      summary: Resend verification/reset code
      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendCodeRequest"
            examples:
              email:
                $ref: "#/components/examples/ResendEmailCodeRequest"
              phone:
                $ref: "#/components/examples/ResendPhoneCodeRequest"
              passwordReset:
                $ref: "#/components/examples/ResendPasswordResetCodeRequest"
      responses:
        "200":
          description: Code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
              examples:
                default:
                  $ref: "#/components/examples/SimpleSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/request-password-reset:
    post:
      tags: [Auth]
      summary: Request password reset
      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestPasswordResetRequest"
            examples:
              default:
                $ref: "#/components/examples/PasswordResetRequest"
      responses:
        "200":
          description: Password reset code sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
              examples:
                default:
                  $ref: "#/components/examples/SimpleSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /auth/verify-password-reset:
    post:
      tags: [Auth]
      summary: Verify password reset OTP
      x-post-response-script: |-
        let json;
        try {
          json = pm.response.json();
        } catch (error) {
          pm.console.log("Response is not JSON; skipping reset token extraction.");
        }

        if (json && typeof json === "object") {
          const data = json.data || {};
          if (data.resetToken) {
            pm.environment.set("resetToken", data.resetToken);
          }
        }
      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"
      requestBody:
        required: true
        content:
          application/json:
