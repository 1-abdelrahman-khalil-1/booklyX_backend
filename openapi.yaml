  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      x-post-response-script: |-
        let json;
        try {
          json = pm.response.json();
        } catch (error) {
          pm.console.log("Response is not JSON; skipping token extraction.");
        }

        if (json && typeof json === "object") {
          const data = json.data || {};
          const roleToAccessVar = {
            client: "clientToken",
            staff: "staffToken",
            branch_admin: "branchAdminToken",
            super_admin: "adminToken",
          };
          const roleToRefreshVar = {
            client: "refreshClientToken",
            staff: "refreshStaffToken",
            branch_admin: "refreshBranchAdminToken",
            super_admin: "refreshAdminToken",
          };

          const role = data.role || pm.environment.get("authRole") || "client";
          pm.environment.set("authRole", role);

          if (data.token) {
            pm.environment.set("authToken", data.token);
            const accessVar = roleToAccessVar[role];
            if (accessVar) pm.environment.set(accessVar, data.token);
          }

          if (data.refreshToken) {
            pm.environment.set("refreshToken", data.refreshToken);
            const refreshVar = roleToRefreshVar[role];
            if (refreshVar) pm.environment.set(refreshVar, data.refreshToken);
          }
        }
      parameters:
        - $ref: "#/components/parameters/AcceptLanguageHeader"
        - $ref: "#/components/parameters/PlatformHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
            examples:
              app:
                $ref: "#/components/examples/RefreshTokenRequest"
      responses:
        "200":
          description: New access token issued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthTokens"
              examples:
                default:
                  $ref: "#/components/examples/RefreshSuccessResponse"
                staff:
                  $ref: "#/components/examples/RefreshStaffSuccessResponse"
                branchAdmin:
                  $ref: "#/components/examples/RefreshBranchAdminSuccessResponse"
                superAdmin:
                  $ref: "#/components/examples/RefreshSuperAdminSuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

