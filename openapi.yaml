openapi: 3.0.3
info:
  title: BooklyX Backend API
  version: 1.0.0
  description: |
    OpenAPI specification for BooklyX backend.

    Notes:
    - Platform-aware endpoints require `platform` header: `APP` or `WEB`.
    - Localized messages use `Accept-Language`: `en` or `ar`.
    - Protected endpoints require `Authorization: Bearer <token>`.
    - In development, OTP is commonly `333333`.
servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://booklyxbackend-production.up.railway.app
    description: Production server

tags:
  - name: Auth
  - name: Branch Admin
  - name: Admin
  - name: Files

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AcceptLanguageHeader:
      name: Accept-Language
      in: header
      required: false
      description: Preferred response language.
      schema:
        type: string
        enum: [en, ar]
        default: en
        example: en
      examples:
        english:
          summary: English language
          value: en
        arabic:
          summary: Arabic language
          value: ar

    PlatformHeader:
      name: platform
      in: header
      required: true
      description: Platform where request is coming from.
      schema:
        type: string
        enum: [APP, WEB]
        default: APP
        example: APP
      examples:
        app:
          summary: Mobile app client
          value: APP
        web:
          summary: Web client
          value: WEB

    ApplicationStatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [PENDING_VERIFICATION, PENDING_APPROVAL, APPROVED, REJECTED]
        default: PENDING_APPROVAL
        example: PENDING_APPROVAL
      examples:
        pendingVerification:
          summary: Pending verification applications
          value: PENDING_VERIFICATION
        pendingApproval:
          summary: Pending approval applications
          value: PENDING_APPROVAL
        approved:
          summary: Approved applications
          value: APPROVED
        rejected:
          summary: Rejected applications
          value: REJECTED

    ServiceStatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [PENDING_APPROVAL, APPROVED, REJECTED]
        default: PENDING_APPROVAL
        example: PENDING_APPROVAL
      examples:
        pendingApproval:
          summary: Pending approval services
          value: PENDING_APPROVAL
        approved:
          summary: Approved services
          value: APPROVED
        rejected:
          summary: Rejected services
          value: REJECTED

  schemas:
    ApiSuccess:
      type: object
      required: [status, error, message, data]
      properties:
        status:
          type: integer
          example: 200
        error:
          type: boolean
          example: false
        message:
          type: string
          example: Request successful.
        data:
          nullable: true

    ApiError:
      type: object
      required: [status, error, message, data]
      properties:
        status:
          type: integer
          example: 400
        error:
          type: boolean
          example: true
        message:
          type: string
          example: Invalid request.
        data:
          nullable: true
          example: null

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Abdo Khalil
        email:
          type: string
          format: email
          example: abdo.khalil@booklyx.com
        phone:
          type: string
          example: "01000000001"
        role:
          type: string
          enum: [client, staff, branch_admin, super_admin]
          default: client
          example: client
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED]
          default: ACTIVE
          example: ACTIVE
        emailVerified:
          type: boolean
          example: true
        phoneVerified:
          type: boolean
          example: true
        staff:
          type: object
          nullable: true
          properties:
            id:
              type: integer
              example: 7
            branchId:
              type: integer
              example: 1
            staffRole:
              type: string
              enum: [DOCTOR, BARBER, SPA_SPECIALIST]
              default: BARBER
              example: BARBER
            commissionPercentage:
              type: number
              example: 15
            isActive:
              type: boolean
              example: true
      example:
        id: 2
        name: Abdo Khalil
        email: abdo.khalil@booklyx.com
        phone: "01000000001"
        role: client
        status: ACTIVE
        emailVerified: true
        phoneVerified: true

    AuthTokens:
      type: object
      properties:
        token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.client-access-token
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.client-refresh-token

    LoginResponseData:
      allOf:
        - $ref: "#/components/schemas/AuthTokens"
        - type: object
          properties:
            user:
              $ref: "#/components/schemas/User"
      example:
        token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.client-access-token
        refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.client-refresh-token
        user:
          id: 2
          name: Abdo Khalil
          email: abdo.khalil@booklyx.com
          phone: "01000000001"
          role: client
          status: ACTIVE
          emailVerified: true
          phoneVerified: true

    RegisterRequest:
      type: object
      required: [name, email, password, phone]
      properties:
        name:
          type: string
          example: Abdo Khalil
        email:
          type: string
          format: email
          example: khalil@booklyx.com
        password:
          type: string
          minLength: 8
          example: "12345678"
        phone:
          type: string
          pattern: '^\\d{10}$'
          example: "01000000009"
      example:
        name: Nour Hassan
        email: nour.hassan@booklyx.com
        password: "12345678"
        phone: "01000000009"

    LoginRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
          example: abdo.khalil@booklyx.com
        password:
          type: string
          example: "12345678"
        role:
          type: string
          enum: [client, staff, branch_admin, super_admin]
          default: client
          example: client
      example:
        email: abdo.khalil@booklyx.com
        password: "12345678"
        role: client

    VerifyCodeRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
          example: abdo.khalil@booklyx.com
        code:
          type: string
          example: "333333"
      example:
        email: abdo.khalil@booklyx.com
        code: "333333"

    ResendCodeRequest:
      type: object
      required: [email, type]
      properties:
        email:
          type: string
          format: email
          example: abdo.khalil@booklyx.com
        phone:
          type: string
          pattern: '^\\d{10}$'
          example: "01000000001"
        type:
          type: string
          enum: [EMAIL, PHONE, PASSWORD_RESET]
          default: EMAIL
          example: EMAIL
      example:
        email: abdo.khalil@booklyx.com
        phone: "01000000001"
        type: EMAIL

    RequestPasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: abdo.khalil@booklyx.com
      example:
        email: abdo.khalil@booklyx.com

    VerifyPasswordResetResponseData:
      type: object
      properties:
        resetToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.password-reset-token
      example:
        resetToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.password-reset-token

    ResetPasswordRequest:
      type: object
      required: [resetToken, newPassword]
      properties:
        resetToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.password-reset-token
        newPassword:
          type: string
          minLength: 8
          example: "NewPass123"
      example:
        resetToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.password-reset-token
        newPassword: "NewPass123"

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.client-refresh-token
      example:
        refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.client-refresh-token

    BranchAdminApplyRequestJson:
      type: object
      required:
        - ownerName
        - email
        - phone
        - password
        - businessName
        - category
        - description
        - city
        - district
        - address
        - taxId
        - commercialRegisterNumber
        - latitude
        - longitude
      properties:
        ownerName:
          type: string
          example: Mona Adel
        email:
          type: string
          format: email
          example: mona.adel@booklyx.com
        phone:
          type: string
          pattern: '^\\d{10}$'
          example: "0101234567"
        password:
          type: string
          minLength: 8
          example: "12345678"
        businessName:
          type: string
          example: Glow Beauty Lounge
        category:
          type: string
          enum: [SPA, CLINIC, BARBER]
          default: SPA
          example: SPA
        description:
          type: string
          example: Premium beauty and skincare services for women.
        city:
          type: string
          example: Cairo
        district:
          type: string
          example: Nasr City
        address:
          type: string
          example: 12 Makram Ebeid Street
        taxId:
          type: string
          example: TAX-2026-010
        commercialRegisterNumber:
          type: string
          example: CR-2026-010
        latitude:
          type: number
          format: double
          example: 30.0626
        longitude:
          type: number
          format: double
          example: 31.3368
      example:
        ownerName: Mona Adel
        email: mona.adel@booklyx.com
        phone: "0101234567"
        password: "12345678"
        businessName: Glow Beauty Lounge
        category: SPA
        description: Premium beauty and skincare services for women.
        commercialRegisterNumber: CR-2026-010
        taxId: TAX-2026-010
        city: Cairo
        district: Nasr City
        address: 12 Makram Ebeid Street
        latitude: 30.0626
        longitude: 31.3368
        logoUrl: https://cdn.booklyx.com/branches/glow-lounge-logo.png

    BranchAdminApplyRequestMultipart:
      allOf:
        - $ref: "#/components/schemas/BranchAdminApplyRequestJson"
        - type: object
          properties:
            logo:
              type: string
              format: binary
            taxCertificate:
              type: string
              format: binary
            commercialRegister:
              type: string
              format: binary
            nationalId:
              type: string
              format: binary
            facilityLicense:
              type: string
              format: binary

    BranchResendCodeRequest:
      type: object
      required: [email, type]
      properties:
        email:
          type: string
          format: email
          example: mona.adel@booklyx.com
        type:
          type: string
          enum: [EMAIL, PHONE]
          default: EMAIL
          example: PHONE
      example:
        email: mona.adel@booklyx.com
        type: PHONE

    CreateStaffRequest:
      type: object
      required: [name, email, phone, password, staffRole, commissionPercentage]
      properties:
        name:
          type: string
          example: Eslam Wael
        email:
          type: string
          format: email
          example: eslam.wael.staff@booklyx.com
        phone:
          type: string
          pattern: '^\\d{10}$'
          example: "01000000021"
        password:
          type: string
          minLength: 8
          example: "12345678"
        staffRole:
          type: string
          enum: [DOCTOR, BARBER, SPA_SPECIALIST]
          default: BARBER
          example: BARBER
        commissionPercentage:
          type: number
          minimum: 0
          maximum: 100
          example: 15
      example:
        name: Eslam Wael
        email: eslam.wael.staff@booklyx.com
        phone: "01000000021"
        password: "12345678"
        staffRole: BARBER
        commissionPercentage: 15

    AddServiceCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Hair Care
      example:
        name: Hair Care

    ServiceCategory:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Hair Care
        branchId:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time
          example: 2026-04-09T10:00:00.000Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-04-09T10:00:00.000Z
      example:
        id: 1
        name: Hair Care
        branchId: 1
        createdAt: 2026-04-09T10:00:00.000Z
        updatedAt: 2026-04-09T10:00:00.000Z

    CreateServiceRequestJson:
      type: object
      required: [name, description, price, durationMinutes]
      properties:
        name:
          type: string
          example: Haircut
        description:
          type: string
          example: Professional haircut with styling
        price:
          type: number
          minimum: 0.01
          example: 150
        durationMinutes:
          type: integer
          minimum: 1
          example: 30
        categoryId:
          type: integer
          minimum: 1
          example: 1
        categoryName:
          type: string
          example: Hair Care
        imageUrl:
          type: string
          format: uri
          example: https://cdn.booklyx.com/services/haircut.png
      example:
        name: Haircut
        description: Professional haircut with styling
        price: 150
        durationMinutes: 30
        categoryName: Hair Care
        imageUrl: https://cdn.booklyx.com/services/haircut.png

    CreateServiceRequestMultipart:
      allOf:
        - $ref: "#/components/schemas/CreateServiceRequestJson"
        - type: object
          properties:
            image:
              type: string
              format: binary

    UpdateServiceRequestJson:
      type: object
      properties:
        id:
          type: integer
          minimum: 1
          example: 1
        name:
          type: string
          example: Premium Haircut
        description:
          type: string
          example: Professional haircut with wash and styling
        price:
          type: number
          minimum: 0.01
          example: 180
        durationMinutes:
          type: integer
          minimum: 1
          example: 40
        categoryId:
          type: integer
          minimum: 1
          example: 1
        categoryName:
          type: string
          example: Hair Care
        imageUrl:
          type: string
          format: uri
          example: https://cdn.booklyx.com/services/premium-haircut.png
      example:
        id: 1
        name: Premium Haircut
        description: Professional haircut with wash and styling
        price: 180
        durationMinutes: 40
        categoryId: 1
        imageUrl: https://cdn.booklyx.com/services/premium-haircut.png

    UpdateServiceRequestMultipart:
      allOf:
        - $ref: "#/components/schemas/UpdateServiceRequestJson"
        - type: object
          properties:
            image:
              type: string
              format: binary

    Service:
      type: object
      properties:
        id:
          type: integer
          example: 1
        branchId:
          type: integer
          example: 1
        serviceCategoryId:
          type: integer
          nullable: true
          example: 1
        name:
          type: string
          example: Haircut
        description:
          type: string
          example: Professional haircut with styling
        price:
          type: number
          example: 150
        durationMinutes:
          type: integer
          example: 30
        imageUrl:
          type: string
          nullable: true
          example: https://cdn.booklyx.com/services/haircut.png
        status:
          type: string
          enum: [PENDING_APPROVAL, APPROVED, REJECTED]
          default: PENDING_APPROVAL
          example: APPROVED
        rejectionReason:
          type: string
          nullable: true
          example: null
        createdAt:
          type: string
          format: date-time
          example: 2026-04-09T10:15:00.000Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-04-09T10:15:00.000Z
        category:
          allOf:
            - $ref: "#/components/schemas/ServiceCategory"
          nullable: true
        branch:
          type: object
          nullable: true
          properties:
            id:
              type: integer
              example: 1
            businessName:
              type: string
              example: Hassan Beauty Salon
            ownerName:
              type: string
              example: Mahmoud Ibrahim
            userId:
              type: integer
              example: 5
            status:
              type: string
              enum: [PENDING_VERIFICATION, PENDING_APPROVAL, APPROVED, REJECTED]
              default: PENDING_VERIFICATION
              example: APPROVED
      example:
        id: 1
        branchId: 1
        serviceCategoryId: 1
        name: Haircut
        description: Professional haircut with styling
        price: 150
        durationMinutes: 30
        imageUrl: https://cdn.booklyx.com/services/haircut.png
        status: APPROVED
        rejectionReason: null
        createdAt: 2026-04-09T10:15:00.000Z
        updatedAt: 2026-04-09T10:15:00.000Z
        category:
          id: 1
          name: Hair Care
          branchId: 1
          createdAt: 2026-04-09T10:00:00.000Z
          updatedAt: 2026-04-09T10:00:00.000Z

    RejectReasonRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 1
          example: Missing required documents.
      example:
        reason: Missing required documents.

    ApplicationDocument:
      type: object
      properties:
        id:
          type: integer
          example: 1
        type:
          type: string
          enum:
            [
              TAX_CERTIFICATE,
              COMMERCIAL_REGISTER,
              NATIONAL_ID,
              FACILITY_LICENSE,
            ]
          default: TAX_CERTIFICATE
          example: COMMERCIAL_REGISTER
        fileUrl:
          type: string
          format: uri
          example: https://booklyxbackend-production.up.railway.app/files/download/commercial-register.pdf
        createdAt:
          type: string
          format: date-time
          example: 2026-04-09T09:50:00.000Z

    ApplicationVerificationCodeSummary:
      type: object
      properties:
        id:
          type: integer
          example: 12
        type:
          type: string
          enum: [EMAIL, PHONE, PASSWORD_RESET]
          default: EMAIL
          example: EMAIL
        expiresAt:
          type: string
          format: date-time
          example: 2026-04-09T10:10:00.000Z
        used:
          type: boolean
          example: true
        attempts:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time
          example: 2026-04-09T10:00:00.000Z

    BranchApplication:
      type: object
      properties:
        id:
          type: integer
          example: 1
        userId:
          type: integer
          nullable: true
          example: 5
        ownerName:
          type: string
          example: Mahmoud Ibrahim
        businessName:
          type: string
          example: Hassan Beauty Salon
        email:
          type: string
          format: email
          example: mahmoud.ibrahim@booklyx.com
        phone:
          type: string
          example: "01000000011"
        category:
          type: string
          enum: [SPA, CLINIC, BARBER]
          default: SPA
          example: SPA
        description:
          type: string
          nullable: true
          example: Premium beauty and skincare services.
        commercialRegisterNumber:
          type: string
          example: CR-2026-001
        taxId:
          type: string
          example: TAX-2026-001
        logoUrl:
          type: string
          nullable: true
          example: https://booklyxbackend-production.up.railway.app/files/download/glow-logo.png
        taxCertificateUrl:
          type: string
          nullable: true
          example: https://booklyxbackend-production.up.railway.app/files/download/tax-certificate.pdf
        commercialRegisterUrl:
          type: string
          nullable: true
          example: https://booklyxbackend-production.up.railway.app/files/download/commercial-register.pdf
        nationalIdUrl:
          type: string
          nullable: true
          example: https://booklyxbackend-production.up.railway.app/files/download/national-id.pdf
        facilityLicenseUrl:
          type: string
          nullable: true
          example: https://booklyxbackend-production.up.railway.app/files/download/facility-license.pdf
        city:
          type: string
          example: Cairo
        district:
          type: string
          example: Nasr City
        address:
          type: string
          example: 12 Makram Ebeid Street
        latitude:
          type: number
          example: 30.0626
        longitude:
          type: number
          example: 31.3368
        status:
          type: string
          enum: [PENDING_VERIFICATION, PENDING_APPROVAL, APPROVED, REJECTED]
          default: PENDING_VERIFICATION
          example: APPROVED
        emailVerified:
          type: boolean
          example: true
        phoneVerified:
          type: boolean
          example: true
        rejectionReason:
          type: string
          nullable: true
          example: null
        createdAt:
          type: string
          format: date-time
          example: 2026-04-09T09:45:00.000Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-04-09T10:20:00.000Z
        documents:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationDocument"
        verificationCodes:
          type: array
          items:
            $ref: "#/components/schemas/ApplicationVerificationCodeSummary"
      example:
        id: 1
        userId: 5
        ownerName: Mahmoud Ibrahim
        businessName: Hassan Beauty Salon
        email: mahmoud.ibrahim@booklyx.com
        phone: "01000000011"
        category: SPA
        description: Premium beauty and skincare services.
        commercialRegisterNumber: CR-2026-001
        taxId: TAX-2026-001
        city: Cairo
        district: Nasr City
        address: 12 Makram Ebeid Street
        latitude: 30.0626
        longitude: 31.3368
        status: APPROVED
        emailVerified: true
        phoneVerified: true
        rejectionReason: null
        createdAt: 2026-04-09T09:45:00.000Z
        updatedAt: 2026-04-09T10:20:00.000Z

  examples:
    RegisterClientRequest:
      value:
        name: Mazen Tamer
        email: mazen.tamer@booklyx.com
        password: "12345678"
        phone: "01000000003"
    LoginClientRequest:
      value:
        email: mazen.tamer@booklyx.com
        password: "12345678"
        role: client
    LoginStaffRequest:
      value:
        email: eslam.wael.staff@booklyx.com
        password: "12345678"
        role: staff
    LoginBranchAdminRequest:
      value:
        email: mahmoud.Ibrahim@booklyx.com
        password: "12345678"
        role: branch_admin
    LoginSuperAdminRequest:
      value:
        email: admin@booklyx.com
        password: "12345678"
        role: super_admin
    VerifyClientCodeRequest:
      value:
        email: mazen.tamer@booklyx.com
        code: "333333"
    VerifyBranchApplicationCodeRequest:
      value:
        email: mahmoud.Ibrahim@booklyx.com
        code: "333333"
    ResendEmailCodeRequest:
      value:
        email: mazen.tamer@booklyx.com
        phone: "01000000003"
        type: EMAIL
    ResendPhoneCodeRequest:
      value:
        email: mazen.tamer@booklyx.com
        phone: "01000000003"
        type: PHONE
    ResendPasswordResetCodeRequest:
      value:
        email: mazen.tamer@booklyx.com
        type: PASSWORD_RESET
    PasswordResetRequest:
      value:
        email: mazen.tamer@booklyx.com
    PasswordResetVerifyRequest:
      value:
        email: mazen.tamer@booklyx.com
        code: "333333"
    ResetPasswordRequest:
      value:
        resetToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.password-reset-token
        newPassword: "NewPass123"
    RefreshTokenRequest:
      value:
        refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.client-refresh-token
